# Maestro flow for the WebView wrapper app — loads the web UI inside the WebView
# and screenshots it. Best-effort interaction with the in-WebView form.
#
# The address bar is pre-filled with http://10.0.2.2:8080 (emulator -> host), so
# tapping "Go" loads the login page served by the backend.
appId: com.example.contactdirectory.webview
---
- launchApp:
    clearState: true
# Wait for the wrapper's own UI (address bar + Go button) to render before the
# first screenshot — otherwise it captures the previous flow's leftover screen.
- assertVisible: "Go"
- takeScreenshot: webview-01-address-bar
- tapOn: "Go"
- extendedWaitUntil:
    visible: "Contact Directory"
    timeout: 20000
- takeScreenshot: webview-02-web-login
