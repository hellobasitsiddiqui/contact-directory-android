name: Maestro UI tests

# End-to-end UI tests with screenshots (the mobile equivalent of the web Playwright
# e2e). Boots the backend (latest released JAR), starts a KVM-accelerated emulator,
# installs both apps (native + webview), runs both Maestro flows, and uploads the
# screenshots as an artifact.
#
# Manual-only: emulator + backend orchestration is slow and best-effort; run it on
# demand rather than on every push.
on:
  workflow_dispatch:

jobs:
  maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build the APKs (native + webview)
        run: gradle :app:assembleDebug :webview:assembleDebug --no-daemon

      # Backend on :8080 (H2 default). The emulator reaches it via 10.0.2.2.
      # Download the backend's released JAR and run it with JDK 21 (the backend
      # targets Java 21; this job's default JDK is 17 for the Android build).
      - name: Boot the backend (released JAR)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list --repo hellobasitsiddiqui/contact-directory --limit 1 --json tagName -q '.[0].tagName')
          echo "backend release: $TAG"
          gh release download "$TAG" --repo hellobasitsiddiqui/contact-directory --pattern '*.jar' --dir backend-jar
          nohup "$JAVA_HOME_21_X64/bin/java" -jar backend-jar/*.jar > /tmp/backend.log 2>&1 &
          echo "waiting for backend health..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/actuator/health && break || sleep 3
          done
          curl -sf http://localhost:8080/actuator/health || (echo "backend did not start"; tail -60 /tmp/backend.log; exit 1)

      # Without KVM the emulator runs in slow software mode (~6 min boot) and is
      # unstable — the first run died with a "Broken pipe" right after boot.
      # Granting KVM access gives hardware acceleration: fast (~1 min) and stable.
      - name: Enable KVM hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro flows on an emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # NOTE: the emulator-runner executes each line in its OWN shell, so a
          # `cd`/`export` on one line does NOT carry to the next. Hence: absolute
          # path to the maestro binary, and `cd` inlined with each test. `|| true`
          # so both flows run and we collect every screenshot taken before any
          # failure (inspect the uploaded artifact to spot a broken flow).
          script: |
            curl -Ls "https://get.maestro.mobile.dev" | bash
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb install -r webview/build/outputs/apk/debug/webview-debug.apk
            mkdir -p maestro-out
            cd maestro-out && $HOME/.maestro/bin/maestro test ../maestro/smoke.yaml || true
            cd maestro-out && $HOME/.maestro/bin/maestro test ../maestro/webview-smoke.yaml || true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: maestro-out/*.png
          if-no-files-found: warn
