name: Build APK

# Builds a debug APK and publishes it to a "latest" pre-release so you can
# download and install it directly on your phone. Runs on every push to main
# and on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/contact-directory.apk

      - name: Upload APK as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: contact-directory-apk
          path: out/contact-directory.apk

      - name: Publish APK to the "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest APK
          prerelease: true
          files: out/contact-directory.apk
          body: >
            Debug build of the Contact Directory Android app (login + welcome).
            Download `contact-directory.apk` below and install it on your phone
            (you'll need to allow installing from unknown sources).
