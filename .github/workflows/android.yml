name: Build APK

# Builds the debug APKs for BOTH apps — the native Compose client (:app) and the
# thin WebView wrapper (:webview) — and publishes them to a "latest" pre-release
# so you can download and install them on your phone. Runs on push to main and on demand.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'   # doc-only changes don't need an APK rebuild
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APKs (native + webview)
        run: gradle :app:assembleDebug :webview:assembleDebug --no-daemon --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/contact-directory.apk
          cp webview/build/outputs/apk/debug/webview-debug.apk out/contact-directory-webview.apk

      - name: Upload APKs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contact-directory-apks
          path: out/*.apk

      - name: Publish APKs to the "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          NOTES=$'Debug builds of the Contact Directory Android apps. Install via "unknown sources":\n• contact-directory.apk — native Compose client.\n• contact-directory-webview.apk — thin WebView wrapper (set the server URL in the address bar).'
          # Idempotent: create the rolling release if missing, then overwrite its assets.
          if ! gh release view latest --repo "$REPO" >/dev/null 2>&1; then
            gh release create latest --repo "$REPO" --prerelease --title "Latest APKs" --notes "$NOTES" --target "$GITHUB_SHA"
          fi
          gh release upload latest out/contact-directory.apk out/contact-directory-webview.apk --repo "$REPO" --clobber
